<script>
  const PRESETS = [
    { name: "Холодильник", room: "Кухня", power: 150, qty: 1, dayHours: 16, nightHours: 8, days: 30 },
    { name: "Электрочайник", room: "Кухня", power: 2000, qty: 1, dayHours: 0.3, nightHours: 0, days: 30 },
    { name: "Микроволновка", room: "Кухня", power: 1200, qty: 1, dayHours: 0.4, nightHours: 0, days: 25 },
    { name: "Электроплита", room: "Кухня", power: 3000, qty: 1, dayHours: 1.2, nightHours: 0.3, days: 30 },
    { name: "Посудомоечная машина", room: "Кухня", power: 1800, qty: 1, dayHours: 0.2, nightHours: 1.0, days: 20 },
    { name: "Стиральная машина", room: "Прачечная", power: 2000, qty: 1, dayHours: 0.2, nightHours: 0.8, days: 12 },
    { name: "Бойлер", room: "Санузел", power: 1500, qty: 1, dayHours: 1.5, nightHours: 1.5, days: 30 },
    { name: "Насос скважины", room: "Техпомещение", power: 1000, qty: 1, dayHours: 1.2, nightHours: 0.3, days: 30 },
    { name: "Тёплый пол", room: "Санузел", power: 800, qty: 1, dayHours: 2, nightHours: 4, days: 30 },
    { name: "Конвектор", room: "Гостиная", power: 2000, qty: 2, dayHours: 2, nightHours: 3, days: 30 },
    { name: "Телевизор", room: "Гостиная", power: 120, qty: 1, dayHours: 4, nightHours: 0, days: 30 },
    { name: "Освещение LED", room: "Дом", power: 12, qty: 15, dayHours: 1, nightHours: 4, days: 30 },
    { name: "Компьютер", room: "Кабинет", power: 300, qty: 1, dayHours: 6, nightHours: 0, days: 24 },
    { name: "Wi-Fi роутер", room: "Дом", power: 12, qty: 1, dayHours: 16, nightHours: 8, days: 30 }
  ];

  const devicesBody = document.getElementById("devicesBody");
  const emptyState = document.getElementById("emptyState");
  const roomsList = document.getElementById("roomsList");
  const presetButtons = document.getElementById("presetButtons");

  const dayTariffInput = document.getElementById("dayTariff");
  const nightTariffInput = document.getElementById("nightTariff");
  const seasonFactorInput = document.getElementById("seasonFactor");
  const houseModeSelect = document.getElementById("houseMode");
  const reserveInput = document.getElementById("reserve");

  const dailyKwhEl = document.getElementById("dailyKwh");
  const monthlyKwhEl = document.getElementById("monthlyKwh");
  const monthlyDayKwhEl = document.getElementById("monthlyDayKwh");
  const monthlyNightKwhEl = document.getElementById("monthlyNightKwh");
  const yearlyKwhEl = document.getElementById("yearlyKwh");
  const monthlyCostEl = document.getElementById("monthlyCost");
  const yearlyCostEl = document.getElementById("yearlyCost");
  const peakLoadEl = document.getElementById("peakLoad");

  const totalDevicesEl = document.getElementById("totalDevices");
  const avgDayEl = document.getElementById("avgDay");
  const dayTariffInfoEl = document.getElementById("dayTariffInfo");
  const nightTariffInfoEl = document.getElementById("nightTariffInfo");
  const seasonInfoEl = document.getElementById("seasonInfo");
  const modeInfoEl = document.getElementById("modeInfo");

  const addRowBtn = document.getElementById("addRowBtn");
  const recalcBtn = document.getElementById("recalcBtn");
  const fillExampleBtn = document.getElementById("fillExampleBtn");
  const clearBtn = document.getElementById("clearBtn");
  const printBtn = document.getElementById("printBtn");
  const downloadBtn = document.getElementById("downloadBtn");

  const chartCanvas = document.getElementById("energyChart");
  const ctx = chartCanvas.getContext("2d");

  function toNumber(value, fallback = 0) {
    const num = Number.parseFloat(value);
    return Number.isFinite(num) ? num : fallback;
  }

  function clamp(value, min = 0, max = Infinity) {
    return Math.min(Math.max(value, min), max);
  }

  function formatNumber(value, digits = 2) {
    return Number(value || 0).toLocaleString("ru-RU", {
      minimumFractionDigits: digits,
      maximumFractionDigits: digits
    });
  }

  function formatCompact(value) {
    return Number(value || 0).toLocaleString("ru-RU", {
      maximumFractionDigits: 2
    });
  }

  function getModeLabel() {
    const option = houseModeSelect.options[houseModeSelect.selectedIndex];
    return option ? option.textContent : "—";
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function createCellInput(type, value, className = "", min = "", step = "") {
    const input = document.createElement("input");
    input.type = type;
    input.value = value;
    if (className) input.className = className;
    if (min !== "") input.min = min;
    if (step !== "") input.step = step;
    input.addEventListener("input", calculateAll);
    return input;
  }

  function normalizeDevice(raw) {
    return {
      row: raw.row || null,
      name: String(raw.name || "").trim(),
      room: String(raw.room || "").trim() || "Без помещения",
      power: clamp(toNumber(raw.power), 0),
      qty: clamp(toNumber(raw.qty), 0),
      dayHours: clamp(toNumber(raw.dayHours), 0, 24),
      nightHours: clamp(toNumber(raw.nightHours), 0, 24),
      days: clamp(toNumber(raw.days), 0, 31)
    };
  }

  function isMeaningfulRow(item) {
    return (
      item.name !== "" &&
      item.power > 0 &&
      item.qty > 0 &&
      item.days > 0 &&
      (item.dayHours > 0 || item.nightHours > 0)
    );
  }

  function getSettings() {
    return {
      dayTariff: clamp(toNumber(dayTariffInput.value), 0),
      nightTariff: clamp(toNumber(nightTariffInput.value), 0),
      seasonFactor: clamp(toNumber(seasonFactorInput.value, 1), 0),
      houseMode: clamp(toNumber(houseModeSelect.value, 1), 0),
      reservePercent: clamp(toNumber(reserveInput.value), 0)
    };
  }

  function calculateDevice(device, settings) {
    const normalized = normalizeDevice(device);
    const valid = isMeaningfulRow(normalized);

    if (!valid) {
      return {
        ...normalized,
        valid: false,
        dayKwhRaw: 0,
        nightKwhRaw: 0,
        totalKwhRaw: 0,
        dayKwhAdjusted: 0,
        nightKwhAdjusted: 0,
        totalKwhAdjusted: 0,
        monthlyCostRaw: 0,
        monthlyCostAdjusted: 0,
        peakWatts: 0,
        sharePercent: 0
      };
    }

    const dayKwhRaw = (normalized.power * normalized.qty * normalized.dayHours * normalized.days) / 1000;
    const nightKwhRaw = (normalized.power * normalized.qty * normalized.nightHours * normalized.days) / 1000;
    const totalKwhRaw = dayKwhRaw + nightKwhRaw;
    const monthlyCostRaw = (dayKwhRaw * settings.dayTariff) + (nightKwhRaw * settings.nightTariff);
    const adjustFactor = settings.seasonFactor * settings.houseMode;

    return {
      ...normalized,
      valid: true,
      dayKwhRaw,
      nightKwhRaw,
      totalKwhRaw,
      dayKwhAdjusted: dayKwhRaw * adjustFactor,
      nightKwhAdjusted: nightKwhRaw * adjustFactor,
      totalKwhAdjusted: totalKwhRaw * adjustFactor,
      monthlyCostRaw,
      monthlyCostAdjusted: monthlyCostRaw * adjustFactor,
      peakWatts: normalized.power * normalized.qty,
      sharePercent: 0
    };
  }

  function calculateSummary(rowsData, settings) {
    const devices = rowsData.map(item => calculateDevice(item, settings));
    const validDevices = devices.filter(item => item.valid);

    const totals = validDevices.reduce((acc, item) => {
      acc.dayKwh += item.dayKwhAdjusted;
      acc.nightKwh += item.nightKwhAdjusted;
      acc.monthlyKwh += item.totalKwhAdjusted;
      acc.monthlyCost += item.monthlyCostAdjusted;
      acc.peakWatts += item.peakWatts;
      return acc;
    }, {
      dayKwh: 0,
      nightKwh: 0,
      monthlyKwh: 0,
      monthlyCost: 0,
      peakWatts: 0
    });

    const devicesWithShare = devices.map(item => ({
      ...item,
      sharePercent: totals.monthlyKwh > 0 ? (item.totalKwhAdjusted / totals.monthlyKwh) * 100 : 0
    }));

    const rooms = validDevices.reduce((acc, item) => {
      if (!acc[item.room]) {
        acc[item.room] = { kwh: 0, count: 0 };
      }
      acc[item.room].kwh += item.totalKwhAdjusted;
      acc[item.room].count += 1;
      return acc;
    }, {});

    const peakKw = totals.peakWatts / 1000;
    const peakKwWithReserve = peakKw * (1 + settings.reservePercent / 100);

    return {
      devices: devicesWithShare,
      validDevicesCount: validDevices.length,
      dayKwh: totals.dayKwh,
      nightKwh: totals.nightKwh,
      monthlyKwh: totals.monthlyKwh,
      monthlyCost: totals.monthlyCost,
      dailyKwh: totals.monthlyKwh / 30,
      yearlyKwh: totals.monthlyKwh * 12,
      yearlyCost: totals.monthlyCost * 12,
      peakKw,
      peakKwWithReserve,
      rooms
    };
  }

    const nameTd = document.createElement("td");
    const roomTd = document.createElement("td");
    const powerTd = document.createElement("td");
    const qtyTd = document.createElement("td");
    const dayHoursTd = document.createElement("td");
    const nightHoursTd = document.createElement("td");
    const daysTd = document.createElement("td");
    const dayKwhTd = document.createElement("td");
    const nightKwhTd = document.createElement("td");
    const costTd = document.createElement("td");
    const shareTd = document.createElement("td");
    const deleteTd = document.createElement("td");

    const nameInput = createCellInput("text", device.name || "", "device-name");
    const roomInput = createCellInput("text", device.room || "", "device-room");
    const powerInput = createCellInput("number", device.power ?? 0, "device-power", "0", "1");
    const qtyInput = createCellInput("number", device.qty ?? 0, "device-qty", "0", "1");
    const dayHoursInput = createCellInput("number", device.dayHours ?? 0, "device-day-hours", "0", "0.1");
    const nightHoursInput = createCellInput("number", device.nightHours ?? 0, "device-night-hours", "0", "0.1");
    const daysInput = createCellInput("number", device.days ?? 0, "device-days", "0", "1");

    const dayKwhOutput = document.createElement("div");
    dayKwhOutput.className = "row-day-kwh";
    dayKwhOutput.textContent = "0";

    const nightKwhOutput = document.createElement("div");
    nightKwhOutput.className = "row-night-kwh";
    nightKwhOutput.textContent = "0";

    const costOutput = document.createElement("div");
    costOutput.className = "row-cost";
    costOutput.textContent = "0";

    const shareOutput = document.createElement("div");
    shareOutput.className = "row-share";
    shareOutput.textContent = "0%";

    const delBtn = document.createElement("button");
    delBtn.type = "button";
    delBtn.className = "btn-danger";
    delBtn.textContent = "×";
    delBtn.title = "Удалить строку";
    delBtn.addEventListener("click", () => {
      tr.remove();
      calculateAll();
    });

    nameTd.appendChild(nameInput);
    roomTd.appendChild(roomInput);
    powerTd.appendChild(powerInput);
    qtyTd.appendChild(qtyInput);
    dayHoursTd.appendChild(dayHoursInput);
    nightHoursTd.appendChild(nightHoursInput);
    daysTd.appendChild(daysInput);
    dayKwhTd.appendChild(dayKwhOutput);
    nightKwhTd.appendChild(nightKwhOutput);
    costTd.appendChild(costOutput);
    shareTd.appendChild(shareOutput);
    deleteTd.appendChild(delBtn);

    tr.appendChild(nameTd);
    tr.appendChild(roomTd);
    tr.appendChild(powerTd);
    tr.appendChild(qtyTd);
    tr.appendChild(dayHoursTd);
    tr.appendChild(nightHoursTd);
    tr.appendChild(daysTd);
    tr.appendChild(dayKwhTd);
    tr.appendChild(nightKwhTd);
    tr.appendChild(costTd);
    tr.appendChild(shareTd);
    tr.appendChild(deleteTd);

    devicesBody.appendChild(tr);
    calculateAll();
  }

  function getRowsData() {
    const rows = [...devicesBody.querySelectorAll("tr")];
    return rows.map(row => ({
      row,
      name: row.querySelector(".device-name").value,
      room: row.querySelector(".device-room").value,
      power: row.querySelector(".device-power").value,
      qty: row.querySelector(".device-qty").value,
      dayHours: row.querySelector(".device-day-hours").value,
      nightHours: row.querySelector(".device-night-hours").value,
      days: row.querySelector(".device-days").value
    }));
  }

  function renderPresetButtons() {
    presetButtons.innerHTML = "";
    PRESETS.forEach(preset => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = `${preset.name} — ${preset.power} Вт`;
      btn.addEventListener("click", () => addDeviceRow(preset));
      presetButtons.appendChild(btn);
    });
  }

  function clearAllRows() {
    devicesBody.innerHTML = "";
    calculateAll();
  }

  function fillExample() {
    clearAllRows();
    [
      { name: "Холодильник", room: "Кухня", power: 150, qty: 1, dayHours: 16, nightHours: 8, days: 30 },
      { name: "Освещение LED", room: "Дом", power: 12, qty: 20, dayHours: 1, nightHours: 4, days: 30 },
      { name: "Телевизор", room: "Гостиная", power: 120, qty: 1, dayHours: 4, nightHours: 0, days: 30 },
      { name: "Бойлер", room: "Санузел", power: 1500, qty: 1, dayHours: 1.5, nightHours: 1.5, days: 30 },
      { name: "Насос скважины", room: "Техпомещение", power: 1000, qty: 1, dayHours: 1.2, nightHours: 0.3, days: 30 },
      { name: "Электрочайник", room: "Кухня", power: 2000, qty: 1, dayHours: 0.3, nightHours: 0, days: 30 },
      { name: "Конвектор", room: "Гостиная", power: 2000, qty: 2, dayHours: 2, nightHours: 3, days: 30 },
      { name: "Стиральная машина", room: "Прачечная", power: 2000, qty: 1, dayHours: 0.2, nightHours: 0.8, days: 12 }
    ].forEach(addDeviceRow);
  }

  function renderRoomsBreakdown(rooms) {
    roomsList.innerHTML = "";

    const entries = Object.entries(rooms).sort((a, b) => b[1].kwh - a[1].kwh);

    if (entries.length === 0) {
      const div = document.createElement("div");
      div.className = "room-item";
      div.innerHTML = '<div class="room-left"><div class="room-name">Нет данных</div><div class="room-meta">Добавьте приборы для расчёта</div></div><div class="room-value">0 кВт·ч</div>';
      roomsList.appendChild(div);
      return;
    }

    entries.forEach(([roomName, data]) => {
      const item = document.createElement("div");
      item.className = "room-item";
      item.innerHTML = `
        <div class="room-left">
          <div class="room-name">${escapeHtml(roomName)}</div>
          <div class="room-meta">Приборов: ${data.count}</div>
        </div>
        <div class="room-value">${formatNumber(data.kwh, 2)} кВт·ч</div>
      `;
      roomsList.appendChild(item);
    });
  }

  function roundRect(ctx, x, y, width, height, radius, fill, stroke) {
    if (typeof radius === "number") {
      radius = { tl: radius, tr: radius, br: radius, bl: radius };
    } else {
      radius = { tl: 0, tr: 0, br: 0, bl: 0, ...radius };
    }

    ctx.beginPath();
    ctx.moveTo(x + radius.tl, y);
    ctx.lineTo(x + width - radius.tr, y);
    ctx.quadraticCurveTo(x + width, y, x + width, y + radius.tr);
    ctx.lineTo(x + width, y + height - radius.br);
    ctx.quadraticCurveTo(x + width, y + height, x + width - radius.br, y + height);
    ctx.lineTo(x + radius.bl, y + height);
    ctx.quadraticCurveTo(x, y + height, x, y + height - radius.bl);
    ctx.lineTo(x, y + radius.tl);
    ctx.quadraticCurveTo(x, y, x + radius.tl, y);
    ctx.closePath();

    if (fill) ctx.fill();
    if (stroke) ctx.stroke();
  }

  function drawChart(dayValue, nightValue, totalValue) {
    const canvas = chartCanvas;
    const context = ctx;
    const width = canvas.width;
    const height = canvas.height;

    context.clearRect(0, 0, width, height);

    const labels = ["День", "Ночь", "Итого"];
    const values = [dayValue, nightValue, totalValue];
    const maxValue = Math.max(...values, 1);

    const chartX = 70;
    const chartY = 20;
    const chartWidth = width - 100;
    const chartHeight = height - 70;
    const barWidth = 110;
    const gap = 80;

    context.strokeStyle = "#dbe3ee";
    context.lineWidth = 1;

    for (let i = 0; i <= 4; i++) {
      const y = chartY + (chartHeight / 4) * i;
      context.beginPath();
      context.moveTo(chartX, y);
      context.lineTo(chartX + chartWidth, y);
      context.stroke();
    }

    context.fillStyle = "#6b7280";
    context.font = "12px Arial";
    context.textAlign = "left";

    for (let i = 0; i <= 4; i++) {
      const value = maxValue - (maxValue / 4) * i;
      const y = chartY + (chartHeight / 4) * i;
      context.fillText(formatCompact(value), 10, y + 4);
    }

    const colors = ["#60a5fa", "#1d4ed8", "#059669"];

    values.forEach((value, index) => {
      const x = chartX + 40 + index * (barWidth + gap);
      const barHeight = (value / maxValue) * (chartHeight - 10);
      const y = chartY + chartHeight - barHeight;

      context.fillStyle = colors[index];
      roundRect(context, x, y, barWidth, barHeight, 14, true, false);

      context.fillStyle = "#16202f";
      context.font = "bold 13px Arial";
      context.textAlign = "center";
      context.fillText(formatCompact(value), x + barWidth / 2, y - 10);

      context.fillStyle = "#475569";
      context.font = "13px Arial";
      context.fillText(labels[index], x + barWidth / 2, chartY + chartHeight + 22);
    });

    context.textAlign = "left";
  }

  function calculateAll() {
    const settings = getSettings();
    const rowsData = getRowsData();
    const result = calculateSummary(rowsData, settings);

    result.devices.forEach(item => {
      if (!item.row) return;
      item.row.querySelector(".row-day-kwh").textContent = formatNumber(item.dayKwhAdjusted, 2);
      item.row.querySelector(".row-night-kwh").textContent = formatNumber(item.nightKwhAdjusted, 2);
      item.row.querySelector(".row-cost").textContent = formatNumber(item.monthlyCostAdjusted, 2);
      item.row.querySelector(".row-share").textContent = formatNumber(item.sharePercent, 1) + "%";
    });

    dailyKwhEl.textContent = formatNumber(result.dailyKwh, 2);
    monthlyKwhEl.textContent = formatNumber(result.monthlyKwh, 2);
    monthlyDayKwhEl.textContent = formatNumber(result.dayKwh, 2);
    monthlyNightKwhEl.textContent = formatNumber(result.nightKwh, 2);
    yearlyKwhEl.textContent = formatNumber(result.yearlyKwh, 2);
    monthlyCostEl.textContent = formatNumber(result.monthlyCost, 2);
    yearlyCostEl.textContent = formatNumber(result.yearlyCost, 2);
    peakLoadEl.textContent = formatNumber(result.peakKwWithReserve, 2);

    totalDevicesEl.textContent = result.validDevicesCount;
    avgDayEl.textContent = formatNumber(result.dailyKwh, 2) + " кВт·ч";
    dayTariffInfoEl.textContent = formatNumber(settings.dayTariff, 2) + " ₽/кВт·ч";
    nightTariffInfoEl.textContent = formatNumber(settings.nightTariff, 2) + " ₽/кВт·ч";
    seasonInfoEl.textContent = formatNumber(settings.seasonFactor, 2);
    modeInfoEl.textContent = getModeLabel();

    emptyState.style.display = rowsData.length === 0 ? "block" : "none";

    renderRoomsBreakdown(result.rooms);
    drawChart(result.dayKwh, result.nightKwh, result.monthlyKwh);
  }

  function downloadReport() {
    const settings = getSettings();
    const rowsData = getRowsData();
    const result = calculateSummary(rowsData, settings);
    const mode = getModeLabel();

    let report = "";
    report += "КАЛЬКУЛЯТОР ЭЛЕКТРОЭНЕРГИИ С ДНЕВНЫМ И НОЧНЫМ ТАРИФОМ\n";
    report += "=====================================================\n\n";
    report += `Дневной тариф: ${formatNumber(settings.dayTariff, 2)} ₽/кВт·ч\n`;
    report += `Ночной тариф: ${formatNumber(settings.nightTariff, 2)} ₽/кВт·ч\n`;
    report += `Сезонный коэффициент: ${formatNumber(settings.seasonFactor, 2)}\n`;
    report += `Режим проживания: ${mode}\n`;
    report += `Запас по нагрузке: ${formatNumber(settings.reservePercent, 0)}%\n\n`;

    report += "ПЕРЕЧЕНЬ ПРИБОРОВ\n";
    report += "-----------------------------------------------------\n";

    let validDevicesFound = 0;

    result.devices.forEach(item => {
      if (!item.valid) return;

      validDevicesFound++;
      report += `${validDevicesFound}. ${item.name || "Без названия"}\n`;
      report += `   Помещение: ${item.room}\n`;
      report += `   Мощность: ${item.power} Вт\n`;
      report += `   Количество: ${item.qty}\n`;
      report += `   Часов днём: ${item.dayHours}\n`;
      report += `   Часов ночью: ${item.nightHours}\n`;
      report += `   Дней в месяц: ${item.days}\n`;
      report += `   Дневное потребление: ${formatNumber(item.dayKwhAdjusted, 2)} кВт·ч\n`;
      report += `   Ночное потребление: ${formatNumber(item.nightKwhAdjusted, 2)} кВт·ч\n`;
      report += `   Стоимость в месяц: ${formatNumber(item.monthlyCostAdjusted, 2)} ₽\n\n`;
    });

    if (validDevicesFound === 0) {
      report += "Нет корректно заполненных приборов.\n\n";
    }

    report += "ИТОГОВЫЕ ПОКАЗАТЕЛИ\n";
    report += "-----------------------------------------------------\n";
    report += `Общий расход в сутки: ${formatNumber(result.dailyKwh, 2)} кВт·ч\n`;
    report += `Общий расход в месяц: ${formatNumber(result.monthlyKwh, 2)} кВт·ч\n`;
    report += `Дневное потребление в месяц: ${formatNumber(result.dayKwh, 2)} кВт·ч\n`;
    report += `Ночное потребление в месяц: ${formatNumber(result.nightKwh, 2)} кВт·ч\n`;
    report += `Расход в год: ${formatNumber(result.yearlyKwh, 2)} кВт·ч\n`;
    report += `Стоимость в месяц: ${formatNumber(result.monthlyCost, 2)} ₽\n`;
    report += `Стоимость в год: ${formatNumber(result.yearlyCost, 2)} ₽\n`;
    report += `Пиковая нагрузка: ${formatNumber(result.peakKwWithReserve, 2)} кВт\n`;

    const blob = new Blob([report], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "electricity-calculator-day-night-tariff.txt";
    document.body.appendChild(a);
    a.click();
    a.remove();

    URL.revokeObjectURL(url);
  }

  dayTariffInput.addEventListener("input", calculateAll);
  nightTariffInput.addEventListener("input", calculateAll);
  seasonFactorInput.addEventListener("input", calculateAll);
  houseModeSelect.addEventListener("change", calculateAll);
  reserveInput.addEventListener("input", calculateAll);

  addRowBtn.addEventListener("click", () => {
    addDeviceRow({
      name: "",
      room: "",
      power: 0,
      qty: 0,
      dayHours: 0,
      nightHours: 0,
      days: 0
    });
  });

  recalcBtn.addEventListener("click", calculateAll);
